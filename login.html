<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSS Base -->
    <link rel="stylesheet" href="assets/css/base.css">
    <!-- Color css -->
    <link rel="stylesheet" href="assets/css/variables.css">
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/auth.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@160..700&display=swap" rel="stylesheet">
    <title>تسجيل الدخول</title>
</head>

<body>
    <header>
        <nav>
            <div class="logo">
                <a href="#" title="ڤيرد">ڤـــــــيرد</a>
            </div>
            <div class="menu">
                <ul>
                    <li><a href="#" id="userIcon" onclick="toggleMenu()"><i class="fa-solid fa-gear"></i></a></li>
                </ul>
            </div>
            <div class="sub-menu-wrap" id="subMenu">
                <div class="sub-menu">
                    <div class="user-menu">
                        <a href="#" class="sub-menu-link">
                            English <i class="fa-solid fa-language"></i>
                            <!-- <span><img class="icon" width="10%" src="assets/icon/egypt.png"></span> -->
                        </a>
                        <a href="#" id="darkModeToggle" class="sub-menu-link">
                            <span id="theme-text">الوضع الليلي</span> <i class="fa-solid fa-moon"></i>
                        </a>
                    </div>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <div class="title">
            <h1>مرحباً بك</h1>
            <p>مساحتك الخاصة لتدوين يومياتك، ومشاركة لحظاتك مع من تحب بضغطة زر.</p>
            <img class="hero-img" src="assets/image/login.png" alt="">
        </div>
        <div class="card">
            <h2>تسجيل الدخول</h2>
            <form action="">
                <label for="phonNumber">رقم الهاتف او البريد الاكترونى</label>
                <input type="text" id="phonNumber" name="" placeholder="رقم الهاتف / البريد الاكترونى" dir="rtl">
                <label for="password">كلمة المرور</label>
                <input type="password" id="password" name="" minlength="8" placeholder="كلمة المرور" dir="rtl">
                <button type="button" id="togglePassword" onclick=""><i class="fa-solid fa-eye"></i></button>
                <button class="but" onclick="">دخول</button>
            </form>
            <p class="link"><a href="#">انشاء حساب جديد</a></p>
        </div>
    </main>
    <!-- Java Script -->
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
